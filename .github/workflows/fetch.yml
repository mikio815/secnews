name: Fetch Security News

on:
  schedule:
    # 毎日 8:00 JST (23:00 UTC) と 20:00 JST (11:00 UTC)
    - cron: '0 23 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update news $(date +'%Y-%m-%d %H:%M JST' --date='TZ=\"Asia/Tokyo\" now')"
          git push
